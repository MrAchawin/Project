<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>แจ้งเรื่องร้องเรียน</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/complaint.js"></script>

</head>

<body>
    <div class="login-box">
        <h2>แจ้งเรื่องร้องเรียน</h2>
        <form id="complaintForm">
            <input type="text" id="name" placeholder="ชื่อผู้แจ้ง" required>
            <input type="text" id="type" placeholder="ประเภทปัญหา" required>
            <div class="file-group">
                <input type="file" id="image" hidden>
                <label for="image" class="upload-btn">แนบรูปภาพ</label>
                <span id="fileName">ยังไม่ได้เลือกไฟล์</span>
            </div>
            <textarea id="detail" placeholder="รายละเอียดปัญหา" rows="4"></textarea>
        </form>
        <button type="button" id="submitBtn" class="login-btn">ส่งเรื่อง</button>

        <div id="result-container"
            style="display: none; margin-top: 20px; padding: 20px; background-color: #e8f5e9; 
                    border-radius: 8px; text-align: center; border: 1px solid #c8e6c9;">
            <p style="margin: 0; color: #2e7d32; font-weight: bold;">
                🎉 ส่งเรื่องสำเร็จ! <br>
                เลขที่เรื่องของคุณคือ: <span id="queue-number"
                    style="color: #1b5e20; font-size: 1.2em; text-decoration: underline;">-</span>
            </p>
        </div>

        <br>
        <button class="status-btn" onclick="location.href='status.html'"
            style="width: 100%;">เช็คสถานะร้องเรียน</button>


</body>

</html>
