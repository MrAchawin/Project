<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ระบบร้องเรียน</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="container">
        <div class="register-box">
            <h2>สมัครสมาชิก</h2>
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" required>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required>
                </div>

                <div class="input-group">
                    <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง" required>
                </div>

                <div id="registerStatusMessage"
                    style="text-align: center; margin-top: 15px; margin-bottom: 10px; font-weight: bold; min-height: 20px;"></div>

                <button type="submit" class="register-btn">สมัครสมาชิก</button>
            </form>
            <p style="margin-top: 25px; text-align: center;">
                มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
            </p>
        </div>

    </div>

    <script src="../js/register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
